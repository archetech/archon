server {
    listen 80;
    server_name archon.social;

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl http2;
    server_name archon.social;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/archon.social/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/archon.social/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Root for static files
    root /var/www/archon.social;

    # API routes → Express backend
    location /api {
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth routes → Express backend
    location /oauth {
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Lightning Address (LUD-16) routes → Express backend
    location /.well-known/lnurlp {
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Trust Registry (TRQP) routes → Express backend
    location /trqp {
        proxy_pass http://127.0.0.1:4260;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # did:webs routes (/:aid/did.json, /:aid/archon.cesr) → Express backend
    # Match patterns like /bagaaiera.../did.json or /bagaaiera.../archon.cesr
    location ~ ^/(bagaaiera[a-z2-7]+)/(did\.json|archon\.cesr|keri\.cesr)$ {
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # DID document for did:web:archon.social
    location /.well-known/did.json {
        alias /var/www/archon.social/.well-known/did.json;
        default_type application/did+json;
    }

    # Registry endpoint → Express backend
    location /registry {
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Directory endpoint → Express backend
    location /directory.json {
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React app routes
    location /login { alias /var/www/archon.social/app; try_files $uri /app/index.html; }
    location /logout { alias /var/www/archon.social/app; try_files $uri /app/index.html; }
    location /members { alias /var/www/archon.social/app; try_files $uri /app/index.html; }
    location /owner { alias /var/www/archon.social/app; try_files $uri /app/index.html; }
    location /profile { alias /var/www/archon.social/app; try_files $uri /app/index.html; }
    location /member { alias /var/www/archon.social/app; try_files $uri /app/index.html; }
    location /credential { alias /var/www/archon.social/app; try_files $uri /app/index.html; }

    # React app at /app
    location /app {
        alias /var/www/archon.social/app;
        try_files $uri $uri/ /app/index.html;
    }

    # Landing page (default fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
