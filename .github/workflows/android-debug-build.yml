name: Android Debug APK (manual)

on:
  workflow_dispatch: {}

jobs:
  build-android-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Use Node 22.15.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.15.0"

      - name: Pin npm 10.9.2
        run: npm install --global npm@10.9.2

      - name: Install root dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build

      - name: Install app dependencies
        working-directory: ./apps/react-wallet
        run: npm ci

      - name: Set up Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407

      - name: Decode signing keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/archon-debug.keystore

      - name: Build Android debug APK
        working-directory: ./apps/react-wallet
        env:
          CI: true
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/archon-debug.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: npm run android:build

      - name: Upload debug APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: archon-android-debug-${{ github.sha }}
          path: apps/react-wallet/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
