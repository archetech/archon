name: Build & Publish Release

on:
  push:
    tags: [ "v*" ]

env:
  REGISTRY: ghcr.io

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      GIT_TAG: ${{ steps.get_tag.outputs.git_tag }}
    steps:
      - name: Checkout Tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.ref_name }}

      - name: Get Git tag
        id: get_tag
        run: echo "git_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

  build_test_images:
    runs-on: ubuntu-latest
    needs: generate
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: docker/Dockerfile.gatekeeper-ts
            image: gatekeeper
          - dockerfile: docker/Dockerfile.keymaster-ts
            image: keymaster
          - dockerfile: docker/Dockerfile.hyperswarm
            image: hyperswarm-mediator
          - dockerfile: docker/Dockerfile.satoshi
            image: sat-mediator
          - dockerfile: docker/Dockerfile.cli
            image: cli
          - dockerfile: docker/Dockerfile.explorer
            image: explorer
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        with:
          images: ${{ env.REGISTRY }}/archetech/${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.generate.outputs.GIT_TAG }}
            type=raw,value=latest

      - name: Build and push Docker images
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            GIT_COMMIT=${{ github.sha }}

      - name: Run Anchore vulnerability scanner
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
        with:
          image: ${{ env.REGISTRY }}/archetech/${{ matrix.image }}:${{
            needs.generate.outputs.GIT_TAG }}
          fail-build: false
          severity-cutoff: critical
          output-format: table
