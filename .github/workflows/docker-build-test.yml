name: Build & Test Docker images

on:
  pull_request:

jobs:
  build_test_images:
    name: build_test_images (${{ matrix.gatekeeper }} gatekeeper, ${{ matrix.keymaster }} keymaster)
    runs-on: ubuntu-latest
    strategy:
      # Always run both legs even if one fails, so a Rust regression doesn't
      # hide a TS regression or vice versa. Apply the same treatment to the
      # keymaster implementation matrix.
      fail-fast: false
      matrix:
        gatekeeper: [rust, typescript]
        keymaster: [typescript, python]
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22.15.0"

      - name: Pin npm 10.9.2
        run: npm install --global npm@10.9.2

      - name: Install dependencies
        run: npm ci

      - name: Setup env for Testing
        working-directory: ./tests/cli-tests
        run: ./generate_test_env.sh

      - name: Run Node
        run: |
          ./start-node-ci cli ${{ matrix.gatekeeper }} ${{ matrix.keymaster }}
          docker compose ps
          sleep 30

      - name: Run cli-tests
        env:
          CLI_TEST_CLEANUP: redis
        run: npm run test:cli

      - name: Grab logs
        if: always()
        run: |
          docker compose logs --no-color keymaster cli gatekeeper redis drawbridge didcomm lightning-mediator > docker-compose-logs.txt
          cat docker-compose-logs.txt

      - name: Teardown Docker
        run: |
          ./stop-node

      - name: Upload docker logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: docker-compose-logs-${{ matrix.gatekeeper }}-${{ matrix.keymaster }}
          path: docker-compose-logs.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: E2E Artifacts (${{ matrix.gatekeeper }}, ${{ matrix.keymaster }})
          path: e2e-results.xml
