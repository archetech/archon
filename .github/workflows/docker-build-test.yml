# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# GitHub recommends pinning actions to a commit SHA.
# To get a newer version, you will need to update the SHA.
# You can also reference a tag or branch, but the action may change without warning.

name: Build & Test Docker images

on:
  pull_request:

jobs:
  build_test_images:
    name: build_test_images (${{ matrix.gatekeeper }} gatekeeper, ${{ matrix.keymaster }} keymaster)
    runs-on: ubuntu-latest
    strategy:
      # Always run both legs even if one fails, so a Rust regression doesn't
      # hide a TS regression or vice versa. Apply the same treatment to the
      # keymaster implementation matrix.
      fail-fast: false
      matrix:
        gatekeeper: [rust, typescript]
        keymaster: [typescript, python]
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22.15.0"

      - name: Pin npm 10.9.2
        run: npm install --global npm@10.9.2

      - name: Install dependencies
        run: npm ci

      - name: Setup env for Testing
        working-directory: ./tests/cli-tests
        run: ./generate_test_env.sh

      - name: Run Node
        run: |
          ./start-node-ci cli ${{ matrix.gatekeeper }} ${{ matrix.keymaster }}
          docker compose ps
          sleep 30

      - name: Run cli-tests
        env:
          CLI_TEST_CLEANUP: redis
        run: npm run test:cli

      - name: Grab logs
        if: always()
        run: |
          docker compose logs --no-color keymaster cli gatekeeper redis > docker-compose-logs.txt
          cat docker-compose-logs.txt

      - name: Teardown Docker
        run: |
          ./stop-node

      - name: Upload docker logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: docker-compose-logs-${{ matrix.gatekeeper }}-${{ matrix.keymaster }}
          path: docker-compose-logs.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: E2E Artifacts (${{ matrix.gatekeeper }}, ${{ matrix.keymaster }})
          path: e2e-results.xml

  # Single stable status that rolls up every build_test_images matrix leg, so
  # branch protection can require one check instead of the fragile per-leg
  # matrix names. `if: always()` is required: without it this job is skipped
  # when a leg fails, and a skipped required check would stall the PR instead
  # of failing it.
  build_test_images_result:
    name: build_test_images result
    if: always()
    needs: build_test_images
    runs-on: ubuntu-latest
    steps:
      - name: Verify all matrix legs passed
        run: |
          result="${{ needs.build_test_images.result }}"
          if [ "$result" != "success" ]; then
            echo "build_test_images did not succeed (result: $result)"
            exit 1
          fi
          echo "All build_test_images legs passed"
