name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - "all"
          - "@didcid/cipher"
          - "@didcid/common"
          - "@didcid/gatekeeper"
          - "@didcid/ipfs"
          - "@didcid/keymaster"
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - current
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
      preid:
        description: "Pre-release identifier"
        required: false
        default: "beta"
        type: choice
        options:
          - beta
          - alpha
          - rc

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22.15.0"
          registry-url: "https://registry.npmjs.org"

      - name: Pin npm 10.9.2
        run: npm install --global npm@10.9.2

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      # (Removed deprecated 'Bootstrap Lerna' step)

      - name: Run tests
        run: |
          if [ "${{ github.event.inputs.package }}" = "all" ]; then
            npx lerna run test --sort --concurrency=1
          else
            npx lerna run test --scope "${{ github.event.inputs.package }}" --include-dependencies --sort --concurrency=1
          fi

      - name: Build packages
        run: |
          if [ "${{ github.event.inputs.package }}" = "all" ]; then
            npx lerna run build --sort --concurrency=1
          else
            npx lerna run build --scope "${{ github.event.inputs.package }}" --include-dependencies --sort --concurrency=1
          fi
        continue-on-error: false

      - name: Version packages
        if: ${{ github.event.inputs.version != 'current' }}
        run: |
          SCOPE_FLAG=""
          if [ "${{ github.event.inputs.package }}" != "all" ]; then
            SCOPE_FLAG="--scope ${{ github.event.inputs.package }}"
          fi

          if [[ "${{ github.event.inputs.version }}" == pre* ]]; then
            npx lerna version ${{ github.event.inputs.version }} --preid ${{ github.event.inputs.preid }} --yes --no-private $SCOPE_FLAG
          else
            npx lerna version ${{ github.event.inputs.version }} --yes --no-private $SCOPE_FLAG
          fi

      - name: Checkout current release tags
        if: ${{ github.event.inputs.version == 'current' }}
        run: |
          PACKAGE="${{ github.event.inputs.package }}"
          if [ "$PACKAGE" = "all" ]; then
            PACKAGE="@didcid/common"
          fi

          PACKAGE_DIR="${PACKAGE##*/}"
          VERSION="$(node -p "require('./packages/${PACKAGE_DIR}/package.json').version")"
          TAG="${PACKAGE}@${VERSION}"
          RELEASE_COMMIT="$(git rev-list -n 1 "$TAG")"

          echo "Publishing from $TAG at $RELEASE_COMMIT"
          git checkout --detach "$RELEASE_COMMIT"

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@11.16.0

      - name: Publish to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_ACCESS: public
          NPM_CONFIG_PROVENANCE: true
        run: |
          SUMMARY_FILE="$(mktemp)"
          if [[ "${{ github.event.inputs.version }}" == pre* ]]; then
            npx lerna publish from-git --dist-tag ${{ github.event.inputs.preid }} --yes --registry https://registry.npmjs.org --summary-file "$SUMMARY_FILE"
          else
            npx lerna publish from-git --yes --registry https://registry.npmjs.org --summary-file "$SUMMARY_FILE"
          fi

          if [ ! -s "$SUMMARY_FILE" ]; then
            echo "Lerna did not publish any packages."
            exit 1
          fi

          cat "$SUMMARY_FILE"
