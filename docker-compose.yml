include:
  # Minimal node:
  #   docker compose --env-file .env -f docker/compose/minimal.yml up
  #
  # To customize this full-node file, set COMPOSE_PROFILES in .env to the
  # comma-separated optional profiles you want to run. Example:
  #   COMPOSE_PROFILES=hyperswarm,cli,btc-signet,pinning
  - docker/compose/core.yml
  #
  # Gatekeeper implementation. Set ARCHON_GATEKEEPER_FLAVOR=rust (or ts) in
  # .env to choose, or export it before `docker compose up`. Defaults to the
  # TypeScript service. Each flavor file carries the full gatekeeper service
  # definition.
  - docker/compose/gatekeeper-${ARCHON_GATEKEEPER_FLAVOR:-ts}.yml

  # Keymaster implementation. Set ARCHON_KEYMASTER_FLAVOR=py (or ts) in
  # .env to choose, or export it before `docker compose up`. Defaults to the
  # TypeScript service. Each flavor file carries the full keymaster service
  # definition. Required by wallet, CLI, Herald, Hyperswarm, and chain
  # mediator services.
  - docker/compose/keymaster-${ARCHON_KEYMASTER_FLAVOR:-ts}.yml

  # Optional node services. These fragments stay included; their services are
  # enabled by matching Docker Compose profiles from COMPOSE_PROFILES.
  # Services with chain, Lightning, Herald, or Hyperswarm dependencies generally
  # require Keymaster to remain enabled.
  - docker/compose/hyperswarm.yml
  - docker/compose/cli.yml
  - docker/compose/explorer.yml
  - docker/compose/gatekeeper-client.yml
  - docker/compose/keymaster-client.yml
  - docker/compose/react-wallet.yml
  - docker/compose/observability.yml
  - docker/compose/btc-mainnet.yml
  - docker/compose/btc-signet.yml
  - docker/compose/lightning.yml
  - docker/compose/drawbridge.yml
  - docker/compose/btc-testnet4.yml
  - docker/compose/zcash-mainnet.yml
  - docker/compose/eth-sepolia.yml
  - docker/compose/sol-devnet.yml
  - docker/compose/pinning.yml
  - docker/compose/filecoin.yml
