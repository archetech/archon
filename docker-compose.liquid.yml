services:
  liquid-node:
    image: blockstream/elementsd:latest
    volumes:
      - ./data/liquid:/root/.elements
    ports:
      - 127.0.0.1:7041:7041
    command:
      - elementsd
      - -chain=liquidv1
      - -rpcport=7041
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=${ARCHON_LIQUID_USER}
      - -rpcpassword=${ARCHON_LIQUID_PASS}
      - -txindex=1
      - -validatepegin=0

  liquid-wallet:
    build:
      context: .
      dockerfile: Dockerfile.wallet
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: ghcr.io/archetech/wallet
    environment:
      - ARCHON_WALLET_PORT=4246
      - ARCHON_WALLET_METRICS_PORT=4247
      - ARCHON_WALLET_NETWORK=liquid
      - ARCHON_WALLET_BTC_HOST=liquid-node
      - ARCHON_WALLET_BTC_PORT=7041
      - ARCHON_WALLET_BTC_USER=${ARCHON_LIQUID_USER}
      - ARCHON_WALLET_BTC_PASS=${ARCHON_LIQUID_PASS}
      - ARCHON_NODE_ID=${ARCHON_NODE_ID}
      - ARCHON_KEYMASTER_URL=http://keymaster:4226
      - ARCHON_ADMIN_API_KEY=${ARCHON_ADMIN_API_KEY}
    user: "${ARCHON_UID}:${ARCHON_GID}"
    ports:
      - "127.0.0.1:4246:4246"
      - "127.0.0.1:4247:4247"
    depends_on:
      keymaster:
        condition: service_started

  liquid-mediator:
    build:
      context: .
      dockerfile: Dockerfile.satoshi
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: ghcr.io/archetech/satoshi-mediator
    environment:
      - ARCHON_GATEKEEPER_URL=http://gatekeeper:4224
      - ARCHON_KEYMASTER_URL=http://keymaster:4226
      - ARCHON_MONGODB_URL=mongodb://mongodb:27017
      - ARCHON_REDIS_URL=redis://redis:6379
      - ARCHON_ADMIN_API_KEY=${ARCHON_ADMIN_API_KEY}
      - ARCHON_NODE_ID=${ARCHON_NODE_ID}
      - ARCHON_SAT_CHAIN=L-BTC:mainnet
      - ARCHON_SAT_NETWORK=liquid
      - ARCHON_SAT_HOST=liquid-node
      - ARCHON_SAT_PORT=7041
      - ARCHON_SAT_START_BLOCK=${ARCHON_LIQUID_START_BLOCK}
      - ARCHON_SAT_USER=${ARCHON_LIQUID_USER}
      - ARCHON_SAT_PASS=${ARCHON_LIQUID_PASS}
      - ARCHON_WALLET_URL=http://liquid-wallet:4246
      - ARCHON_SAT_IMPORT_INTERVAL=${ARCHON_LIQUID_IMPORT_INTERVAL}
      - ARCHON_SAT_EXPORT_INTERVAL=${ARCHON_LIQUID_EXPORT_INTERVAL}
      - ARCHON_SAT_FEE_BLOCK_TARGET=${ARCHON_LIQUID_FEE_BLOCK_TARGET:-1}
      - ARCHON_SAT_FEE_FALLBACK_SAT_BYTE=${ARCHON_LIQUID_FEE_FALLBACK_SAT_BYTE:-1}
      - ARCHON_SAT_FEE_MAX=${ARCHON_LIQUID_FEE_MAX:-0.00001}
      - ARCHON_SAT_RBF_ENABLED=${ARCHON_LIQUID_RBF_ENABLED:-false}
      - ARCHON_SAT_REIMPORT=${ARCHON_LIQUID_REIMPORT}
      - ARCHON_SAT_DB=${ARCHON_LIQUID_DB}
      - ARCHON_SAT_METRICS_PORT=4238
    ports:
      - "127.0.0.1:4238:4238"
    volumes:
      - ./data:/app/satoshi/data
    user: "${ARCHON_UID}:${ARCHON_GID}"
    depends_on:
      - liquid-node
      - gatekeeper
      - keymaster
      - liquid-wallet
