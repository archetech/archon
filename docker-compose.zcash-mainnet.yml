services:
  zcash-mainnet-wallet:
    build:
      context: .
      dockerfile: Dockerfile.zcash-wallet
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: ghcr.io/archetech/zcash-wallet
    environment:
      - ARCHON_WALLET_PORT=4250
      - ARCHON_WALLET_METRICS_PORT=4251
      - ARCHON_WALLET_NETWORK=mainnet
      - ARCHON_WALLET_ZEC_HOST=${ARCHON_ZEC_HOST}
      - ARCHON_WALLET_ZEC_PORT=${ARCHON_ZEC_PORT:-8232}
      - ARCHON_WALLET_ZEC_USER=${ARCHON_ZEC_USER}
      - ARCHON_WALLET_ZEC_PASS=${ARCHON_ZEC_PASS}
      - ARCHON_NODE_ID=${ARCHON_NODE_ID}
      - ARCHON_KEYMASTER_URL=http://keymaster:4226
      - ARCHON_ADMIN_API_KEY=${ARCHON_ADMIN_API_KEY}
    user: "${ARCHON_UID}:${ARCHON_GID}"
    ports:
      - "127.0.0.1:4250:4250"
      - "127.0.0.1:4251:4251"
    depends_on:
      keymaster:
        condition: service_started

  zcash-mainnet-mediator:
    build:
      context: .
      dockerfile: Dockerfile.zcash
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: ghcr.io/archetech/zcash-mediator
    environment:
      - ARCHON_GATEKEEPER_URL=http://gatekeeper:4224
      - ARCHON_KEYMASTER_URL=http://keymaster:4226
      - ARCHON_MONGODB_URL=mongodb://mongodb:27017
      - ARCHON_REDIS_URL=redis://redis:6379
      - ARCHON_ADMIN_API_KEY=${ARCHON_ADMIN_API_KEY}
      - ARCHON_NODE_ID=${ARCHON_NODE_ID}
      - ARCHON_ZEC_CHAIN=${ARCHON_ZEC_CHAIN:-ZEC:mainnet}
      - ARCHON_ZEC_NETWORK=${ARCHON_ZEC_NETWORK:-mainnet}
      - ARCHON_ZEC_HOST=${ARCHON_ZEC_HOST}
      - ARCHON_ZEC_PORT=${ARCHON_ZEC_PORT:-8232}
      - ARCHON_ZEC_USER=${ARCHON_ZEC_USER}
      - ARCHON_ZEC_PASS=${ARCHON_ZEC_PASS}
      - ARCHON_ZEC_START_BLOCK=${ARCHON_ZEC_START_BLOCK}
      - ARCHON_WALLET_URL=http://zcash-mainnet-wallet:4250
      - ARCHON_ZEC_IMPORT_INTERVAL=${ARCHON_ZEC_IMPORT_INTERVAL}
      - ARCHON_ZEC_EXPORT_INTERVAL=${ARCHON_ZEC_EXPORT_INTERVAL}
      - ARCHON_ZEC_FEE_BLOCK_TARGET=${ARCHON_ZEC_FEE_BLOCK_TARGET}
      - ARCHON_ZEC_FEE_FALLBACK_ZAT_BYTE=${ARCHON_ZEC_FEE_FALLBACK_ZAT_BYTE}
      - ARCHON_ZEC_FEE_MAX=${ARCHON_ZEC_FEE_MAX}
      - ARCHON_ZEC_FEE_ORACLE_URL=${ARCHON_ZEC_FEE_ORACLE_URL}
      - ARCHON_ZEC_RBF_ENABLED=${ARCHON_ZEC_RBF_ENABLED}
      - ARCHON_ZEC_REIMPORT=${ARCHON_ZEC_REIMPORT}
      - ARCHON_ZEC_DB=${ARCHON_ZEC_DB}
      - ARCHON_ZEC_METRICS_PORT=4238
    ports:
      - "127.0.0.1:4238:4238"
    volumes:
      - ./data:/app/zcash/data
    user: "${ARCHON_UID}:${ARCHON_GID}"
    depends_on:
      - gatekeeper
      - keymaster
      - zcash-mainnet-wallet
