# DIDComm relay (mailbox) service. Pulled into docker-compose.yml via the
# `include:` directive. Optional — enable with the `didcomm` profile
# (COMPOSE_PROFILES=didcomm). Stores encrypted envelopes addressed by recipient
# DID until the key-holder fetches them. Backend is in-memory by default; set
# ARCHON_DIDCOMM_DB=redis to use the redis service for shared/persistent storage.
services:
  didcomm:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.didcomm
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: ghcr.io/archetech/didcomm
    profiles: ["didcomm"]
    environment:
      - ARCHON_DIDCOMM_PORT=4236
      - ARCHON_BIND_ADDRESS=${ARCHON_BIND_ADDRESS:-0.0.0.0}
      - ARCHON_GATEKEEPER_URL=http://gatekeeper:4224
      - ARCHON_DIDCOMM_UPLOAD_LIMIT=${ARCHON_DIDCOMM_UPLOAD_LIMIT}
      # Mailbox store: 'memory' (default) or 'redis'.
      - ARCHON_DIDCOMM_DB=${ARCHON_DIDCOMM_DB:-memory}
      - ARCHON_REDIS_URL=redis://redis:6379
      # Outbound egress (POST /deliver): dial .onion recipients via Tor (needs
      # the drawbridge profile's tor service). Clearnet delivery needs no proxy.
      - ARCHON_DIDCOMM_TOR_PROXY=${ARCHON_DIDCOMM_TOR_PROXY:-tor:9050}
      # Allow delivery to private/loopback/http hosts. Off in production (SSRF
      # guard); set true only for dev/CI where recipients are in-cluster.
      - ARCHON_DIDCOMM_ALLOW_PRIVATE_EGRESS=${ARCHON_DIDCOMM_ALLOW_PRIVATE_EGRESS:-false}
    user: "${ARCHON_UID}:${ARCHON_GID}"
    ports:
      - "${ARCHON_DIDCOMM_HOST_BIND:-127.0.0.1}:${ARCHON_DIDCOMM_PORT:-4236}:4236"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('http');const
            req=http.get('http://127.0.0.1:4236/health',res=>{let
            body='';res.on('data',chunk=>body+=chunk);res.on('end',()=>process.\
            exit(res.statusCode===200&&body.includes('\"ready\":true')?0:1));})\
            ;req.on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      gatekeeper:
        condition: service_healthy
      # Used only when ARCHON_DIDCOMM_DB=redis; harmless otherwise (core service).
      redis:
        condition: service_healthy
