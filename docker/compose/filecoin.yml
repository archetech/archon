services:
  filecoin-wallet:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.filecoin-wallet
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: ghcr.io/archetech/filecoin-wallet
    environment:
      - ARCHON_FIL_WALLET_PORT=4270
      - ARCHON_FIL_WALLET_METRICS_PORT=4272
      - ARCHON_FIL_NETWORK=${ARCHON_FIL_NETWORK}
      - ARCHON_FIL_RPC_URL=${ARCHON_FIL_RPC_URL}
      - ARCHON_FIL_PRIVATE_KEY=${ARCHON_FIL_PRIVATE_KEY}
      - ARCHON_FIL_WALLET_ADDRESS=${ARCHON_FIL_WALLET_ADDRESS}
      - ARCHON_FIL_SESSION_KEY=${ARCHON_FIL_SESSION_KEY}
      - ARCHON_IPFS_API_URL=http://ipfs:5001/api/v0
      - ARCHON_ADMIN_API_KEY=${ARCHON_ADMIN_API_KEY}
    user: "${ARCHON_UID}:${ARCHON_GID}"
    ports:
      - "127.0.0.1:4270:4270"
      - "127.0.0.1:4272:4272"
    depends_on:
      ipfs:
        condition: service_healthy

  filecoin-mediator:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.filecoin
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: ghcr.io/archetech/filecoin-mediator
    environment:
      - ARCHON_GATEKEEPER_URL=http://gatekeeper:4224
      - ARCHON_WALLET_URL=http://filecoin-wallet:4270
      - ARCHON_ADMIN_API_KEY=${ARCHON_ADMIN_API_KEY}
      - ARCHON_NODE_ID=${ARCHON_NODE_ID}
      - ARCHON_FIL_IMPORT_INTERVAL=${ARCHON_FIL_IMPORT_INTERVAL}
      - ARCHON_FIL_STATE_PATH=/app/filecoin/data/filecoin-pins.json
      - ARCHON_FIL_METRICS_PORT=4271
    ports:
      - "127.0.0.1:4271:4271"
    volumes:
      - ../../data:/app/filecoin/data
    user: "${ARCHON_UID}:${ARCHON_GID}"
    depends_on:
      gatekeeper:
        condition: service_healthy
      filecoin-wallet:
        condition: service_started
