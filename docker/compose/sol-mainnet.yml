services:
  sol-mainnet-wallet:
    profiles: ["sol-mainnet"]
    build:
      context: ../..
      dockerfile: docker/Dockerfile.solana-wallet
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: ghcr.io/archetech/solana-wallet
    environment:
      - ARCHON_WALLET_PORT=4256
      - ARCHON_WALLET_METRICS_PORT=4257
      - ARCHON_WALLET_SOL_NETWORK=mainnet-beta
      - ARCHON_WALLET_SOL_RPC_URL=${ARCHON_SOL_RPC_URL}
      - ARCHON_WALLET_SOL_COMMITMENT=${ARCHON_SOL_COMMITMENT}
      - ARCHON_WALLET_SOL_DERIVATION_PATH=${ARCHON_WALLET_SOL_DERIVATION_PATH}
      - ARCHON_SOL_MEMO_PROGRAM_ID=${ARCHON_SOL_MEMO_PROGRAM_ID}
      - ARCHON_NODE_ID=${ARCHON_NODE_ID}
      - ARCHON_KEYMASTER_URL=http://keymaster:4226
      - ARCHON_ADMIN_API_KEY=${ARCHON_ADMIN_API_KEY}
    user: "${ARCHON_UID}:${ARCHON_GID}"
    ports:
      - "127.0.0.1:4256:4256"
      - "127.0.0.1:4257:4257"
    depends_on:
      keymaster:
        condition: service_started

  sol-mainnet-mediator:
    profiles: ["sol-mainnet"]
    build:
      context: ../..
      dockerfile: docker/Dockerfile.solana
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: ghcr.io/archetech/solana-mediator
    environment:
      - ARCHON_GATEKEEPER_URL=http://gatekeeper:4224
      - ARCHON_KEYMASTER_URL=http://keymaster:4226
      - ARCHON_MONGODB_URL=mongodb://mongodb:27017
      - ARCHON_REDIS_URL=redis://redis:6379
      - ARCHON_ADMIN_API_KEY=${ARCHON_ADMIN_API_KEY}
      - ARCHON_NODE_ID=${ARCHON_NODE_ID}
      - ARCHON_SOL_CHAIN=${ARCHON_SOL_CHAIN:-SOL:mainnet-beta}
      - ARCHON_SOL_NETWORK=mainnet-beta
      - ARCHON_SOL_RPC_URL=${ARCHON_SOL_RPC_URL}
      - ARCHON_SOL_COMMITMENT=${ARCHON_SOL_COMMITMENT}
      - ARCHON_SOL_MEMO_PROGRAM_ID=${ARCHON_SOL_MEMO_PROGRAM_ID}
      - ARCHON_SOL_START_BLOCK=${ARCHON_SOL_START_BLOCK}
      - ARCHON_SOL_SIGNATURE_PAGE_LIMIT=${ARCHON_SOL_SIGNATURE_PAGE_LIMIT}
      - ARCHON_SOL_SIGNATURE_PAGE_MAX=${ARCHON_SOL_SIGNATURE_PAGE_MAX}
      - ARCHON_SOL_PENDING_TX_TIMEOUT_SLOTS=${ARCHON_SOL_PENDING_TX_TIMEOUT_SLOTS}
      - ARCHON_SOL_MIN_BALANCE_LAMPORTS=${ARCHON_SOL_MIN_BALANCE_LAMPORTS}
      - ARCHON_WALLET_URL=http://sol-mainnet-wallet:4256
      - ARCHON_SOL_IMPORT_INTERVAL=${ARCHON_SOL_IMPORT_INTERVAL}
      - ARCHON_SOL_EXPORT_INTERVAL=${ARCHON_SOL_EXPORT_INTERVAL}
      - ARCHON_SOL_REIMPORT=${ARCHON_SOL_REIMPORT}
      - ARCHON_SOL_DB=${ARCHON_SOL_DB}
      - ARCHON_SOL_METRICS_PORT=4248
    ports:
      - "127.0.0.1:4248:4248"
    volumes:
      - ../../data:/app/solana/data
    user: "${ARCHON_UID}:${ARCHON_GID}"
    depends_on:
      - gatekeeper
      - keymaster
      - sol-mainnet-wallet
