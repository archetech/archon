services:
  pinning-mediator:
    profiles: ["pinning"]
    build:
      context: ../..
      dockerfile: docker/Dockerfile.pinning
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: ghcr.io/archetech/pinning-mediator
    environment:
      - ARCHON_GATEKEEPER_URL=http://gatekeeper:4224
      - ARCHON_ADMIN_API_KEY=${ARCHON_ADMIN_API_KEY}
      - ARCHON_NODE_ID=${ARCHON_NODE_ID}
      - ARCHON_PIN_PROVIDER=${ARCHON_PIN_PROVIDER:-filebase}
      - ARCHON_PIN_API_URL=${ARCHON_PIN_API_URL:-https://api.filebase.io/v1/ipfs}
      - ARCHON_PIN_API_TOKEN=${ARCHON_PIN_API_TOKEN:-}
      - ARCHON_PIN_ORIGINS=${ARCHON_PIN_ORIGINS:-}
      - ARCHON_PIN_IMPORT_INTERVAL=${ARCHON_PIN_IMPORT_INTERVAL:-1}
      - ARCHON_PIN_STATE_PATH=/app/pinning/data/pinning-pins.json
      - ARCHON_PIN_METRICS_PORT=4273
    ports:
      - "127.0.0.1:4273:4273"
    volumes:
      - ../../data:/app/pinning/data
    user: "${ARCHON_UID}:${ARCHON_GID}"
    depends_on:
      gatekeeper:
        condition: service_healthy
