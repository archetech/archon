services:
  herald:
    build:
      context: .
      dockerfile: services/herald/Dockerfile
    image: ghcr.io/archetech/herald
    environment:
      - ARCHON_HERALD_NAME=${ARCHON_HERALD_NAME:-herald}
      - ARCHON_HERALD_DOMAIN=${ARCHON_HERALD_DOMAIN:-localhost}
      - ARCHON_HERALD_SESSION_SECRET=${ARCHON_HERALD_SESSION_SECRET}
      - ARCHON_HERALD_PORT=4230
      - ARCHON_DRAWBRIDGE_PORT=4222
      - ARCHON_DRAWBRIDGE_PUBLIC_HOST=${ARCHON_DRAWBRIDGE_PUBLIC_HOST:-}
      - ARCHON_GATEKEEPER_URL=http://gatekeeper:4224
      - ARCHON_HERALD_KEYMASTER_URL=${ARCHON_HERALD_KEYMASTER_URL-http://keymaster:4226}
      - ARCHON_HERALD_WALLET_URL=${ARCHON_HERALD_WALLET_URL:-http://localhost:4228}
      - ARCHON_HERALD_WALLET_PASSPHRASE=${ARCHON_HERALD_WALLET_PASSPHRASE:-}
      - ARCHON_HERALD_DB=${ARCHON_HERALD_DB:-json}
      - ARCHON_REDIS_URL=redis://redis:6379
      - ARCHON_HERALD_DATA_DIR=/app/server/data
      - ARCHON_HERALD_IPFS_API_URL=http://ipfs:5001/api/v0
      - ARCHON_HERALD_IPNS_KEY_NAME=${ARCHON_HERALD_IPNS_KEY_NAME:-herald}
      - ARCHON_HERALD_MEMBERSHIP_SCHEMA_DID=${ARCHON_HERALD_MEMBERSHIP_SCHEMA_DID:-did:cid:bagaaieravnv5onsflewvrz6urhwfjixfnwq7bgc3ejhlrj2nekx75ddhdupq}
      - ARCHON_HERALD_OWNER_DID=${ARCHON_HERALD_OWNER_DID:-}
      - ARCHON_HERALD_TOR_PROXY=${ARCHON_HERALD_TOR_PROXY:-tor:9050}
      - ARCHON_HERALD_ADMIN_API_KEY=${ARCHON_ADMIN_API_KEY}
      - ARCHON_ADMIN_API_KEY=${ARCHON_ADMIN_API_KEY}
    volumes:
      - ./data/herald:/app/server/data
    user: "${ARCHON_UID}:${ARCHON_GID}"
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.get('http://127.0.0.1:4230/api/version',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    depends_on:
      gatekeeper:
        condition: service_healthy
      keymaster:
        condition: service_healthy
      ipfs:
        condition: service_healthy
      redis:
        condition: service_healthy
      tor:
        condition: service_started

  herald-client:
    build:
      context: .
      dockerfile: Dockerfile.herald-client
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        VITE_API_URL: ${ARCHON_DRAWBRIDGE_PUBLIC_HOST:-http://localhost:4222}/names/api
    image: ghcr.io/archetech/herald-client
    environment:
      - VITE_PORT=4231
    user: "${ARCHON_UID}:${ARCHON_GID}"
    ports:
      - "${ARCHON_HERALD_CLIENT_PORT:-4231}:4231"
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.get('http://127.0.0.1:4231/',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      herald:
        condition: service_healthy

  drawbridge:
    build:
      context: .
      dockerfile: Dockerfile.drawbridge
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: ghcr.io/archetech/drawbridge
    entrypoint: ["/bin/sh", "/scripts/drawbridge-entrypoint.sh"]
    environment:
      - ARCHON_DRAWBRIDGE_PORT=4222
      - ARCHON_BIND_ADDRESS=${ARCHON_BIND_ADDRESS:-0.0.0.0}
      - ARCHON_ADMIN_API_KEY=${ARCHON_ADMIN_API_KEY}
      - ARCHON_GATEKEEPER_URL=http://gatekeeper:4224
      - ARCHON_LIGHTNING_MEDIATOR_URL=http://lightning-mediator:4235
      - ARCHON_REDIS_URL=redis://redis:6379
      - ARCHON_DRAWBRIDGE_L402_ENABLED=${ARCHON_DRAWBRIDGE_L402_ENABLED:-false}
      - ARCHON_DRAWBRIDGE_MACAROON_SECRET=${ARCHON_DRAWBRIDGE_MACAROON_SECRET:-}
      - ARCHON_DRAWBRIDGE_DEFAULT_PRICE_SATS=${ARCHON_DRAWBRIDGE_DEFAULT_PRICE_SATS:-10}
      - ARCHON_DRAWBRIDGE_INVOICE_EXPIRY=${ARCHON_DRAWBRIDGE_INVOICE_EXPIRY:-3600}
      - ARCHON_DRAWBRIDGE_RATE_LIMIT_MAX=${ARCHON_DRAWBRIDGE_RATE_LIMIT_MAX:-100}
      - ARCHON_DRAWBRIDGE_RATE_LIMIT_WINDOW=${ARCHON_DRAWBRIDGE_RATE_LIMIT_WINDOW:-60}
      - ARCHON_HERALD_URL=http://herald:4230
    user: "${ARCHON_UID}:${ARCHON_GID}"
    ports:
      - ${ARCHON_DRAWBRIDGE_PORT:-4222}:4222
    volumes:
      - ./scripts/drawbridge-entrypoint.sh:/scripts/drawbridge-entrypoint.sh:ro
      - ./data/drawbridge:/data/drawbridge
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.get('http://127.0.0.1:4222/api/v1/ready',res=>{let body='';res.on('data',chunk=>body+=chunk);res.on('end',()=>process.exit(res.statusCode===200&&(body.trim()==='true'||body.includes('\"ready\":true'))?0:1));});req.on('error',()=>process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 25s
    depends_on:
      gatekeeper:
        condition: service_healthy
      lightning-mediator:
        condition: service_healthy
      redis:
        condition: service_healthy

  lightning-mediator:
    build:
      context: .
      dockerfile: Dockerfile.lightning-mediator
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: ghcr.io/archetech/lightning-mediator
    environment:
      - ARCHON_LIGHTNING_MEDIATOR_PORT=${ARCHON_LIGHTNING_MEDIATOR_PORT:-4235}
      - ARCHON_BIND_ADDRESS=${ARCHON_BIND_ADDRESS:-0.0.0.0}
      - ARCHON_DRAWBRIDGE_PORT=${ARCHON_DRAWBRIDGE_PORT:-4222}
      - ARCHON_DRAWBRIDGE_PUBLIC_HOST=${ARCHON_DRAWBRIDGE_PUBLIC_HOST:-}
      - ARCHON_LIGHTNING_MEDIATOR_REDIS_URL=redis://redis:6379
      - ARCHON_GATEKEEPER_URL=http://gatekeeper:4224
      - ARCHON_LIGHTNING_MEDIATOR_CLN_REST_URL=${ARCHON_LIGHTNING_MEDIATOR_CLN_REST_URL:-https://cln:3001}
      - ARCHON_LIGHTNING_MEDIATOR_CLN_RUNE=${ARCHON_LIGHTNING_MEDIATOR_CLN_RUNE:-}
      - ARCHON_LIGHTNING_MEDIATOR_LNBITS_URL=${ARCHON_LIGHTNING_MEDIATOR_LNBITS_URL:-}
      - ARCHON_LIGHTNING_MEDIATOR_PUBLIC_HOST=${ARCHON_LIGHTNING_MEDIATOR_PUBLIC_HOST:-}
      - ARCHON_LIGHTNING_MEDIATOR_TOR_PROXY=${ARCHON_LIGHTNING_MEDIATOR_TOR_PROXY:-tor:9050}
    user: "${ARCHON_UID}:${ARCHON_GID}"
    ports:
      - ${ARCHON_LIGHTNING_MEDIATOR_PORT:-4235}:4235
    volumes:
      - tor-hostname:/data/tor:ro
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.get('http://127.0.0.1:4235/ready',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      gatekeeper:
        condition: service_healthy
      redis:
        condition: service_healthy

  drawbridge-client:
    build:
      context: .
      dockerfile: Dockerfile.gatekeeper-client
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        VITE_SERVER_PORT: ${ARCHON_DRAWBRIDGE_PORT:-4222}
    image: ghcr.io/archetech/drawbridge-client
    environment:
      - VITE_PORT=4223
    user: "${ARCHON_UID}:${ARCHON_GID}"
    ports:
      - "${ARCHON_DRAWBRIDGE_CLIENT_PORT:-4223}:4223"
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.get('http://127.0.0.1:4223/',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      drawbridge:
        condition: service_healthy

  tor:
    image: goldy/tor-hidden-service:latest
    ports:
      - "${ARCHON_TOR_SOCKS_PORT:-9050}:9050"
    environment:
      DRAWBRIDGE_TOR_SERVICE_HOSTS: '4222:drawbridge:4222'
      DRAWBRIDGE_TOR_SERVICE_VERSION: '3'
      TOR_SOCKS_PORT: '0.0.0.0:9050'
    volumes:
      - ./data/tor-drawbridge:/var/lib/tor/hidden_service
      - tor-hostname:/tor-hostname
    entrypoint:
      - /bin/sh
      - -c
      - |
        pyentrypoint tor &
        while [ ! -f /var/lib/tor/hidden_service/drawbridge/hostname ]; do sleep 1; done
        cp /var/lib/tor/hidden_service/drawbridge/hostname /tor-hostname/hostname
        chmod 644 /tor-hostname/hostname
        echo '[tor] Published onion hostname'
        wait
    depends_on:
      drawbridge:
        condition: service_healthy

volumes:
  tor-hostname:
