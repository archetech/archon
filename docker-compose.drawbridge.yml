services:
  drawbridge:
    build:
      context: .
      dockerfile: Dockerfile.drawbridge
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: ghcr.io/archetech/drawbridge
    entrypoint: ["/bin/sh", "/scripts/drawbridge-entrypoint.sh"]
    environment:
      - ARCHON_DRAWBRIDGE_PORT=4222
      - ARCHON_BIND_ADDRESS=${ARCHON_BIND_ADDRESS:-0.0.0.0}
      - ARCHON_ADMIN_API_KEY=${ARCHON_ADMIN_API_KEY}
      - ARCHON_GATEKEEPER_URL=http://gatekeeper:4224
      - ARCHON_REDIS_URL=redis://redis:6379
      - ARCHON_DRAWBRIDGE_LNBITS_URL=${ARCHON_DRAWBRIDGE_LNBITS_URL:-}
      - ARCHON_DRAWBRIDGE_CLN_REST_URL=${ARCHON_DRAWBRIDGE_CLN_REST_URL:-https://cln:3001}
      - ARCHON_DRAWBRIDGE_CLN_RUNE=${ARCHON_DRAWBRIDGE_CLN_RUNE:-}
      - ARCHON_DRAWBRIDGE_L402_ENABLED=${ARCHON_DRAWBRIDGE_L402_ENABLED:-false}
      - ARCHON_DRAWBRIDGE_MACAROON_SECRET=${ARCHON_DRAWBRIDGE_MACAROON_SECRET:-}
      - ARCHON_DRAWBRIDGE_DEFAULT_PRICE_SATS=${ARCHON_DRAWBRIDGE_DEFAULT_PRICE_SATS:-10}
      - ARCHON_DRAWBRIDGE_INVOICE_EXPIRY=${ARCHON_DRAWBRIDGE_INVOICE_EXPIRY:-3600}
      - ARCHON_DRAWBRIDGE_RATE_LIMIT_MAX=${ARCHON_DRAWBRIDGE_RATE_LIMIT_MAX:-100}
      - ARCHON_DRAWBRIDGE_RATE_LIMIT_WINDOW=${ARCHON_DRAWBRIDGE_RATE_LIMIT_WINDOW:-60}
      - ARCHON_DRAWBRIDGE_PUBLIC_HOST=${ARCHON_DRAWBRIDGE_PUBLIC_HOST:-}
      - ARCHON_TOR_PROXY=tor:9050
    user: "${ARCHON_UID}:${ARCHON_GID}"
    ports:
      - ${ARCHON_DRAWBRIDGE_PORT:-4222}:4222
    volumes:
      - ./scripts/drawbridge-entrypoint.sh:/scripts/drawbridge-entrypoint.sh:ro
      - ./data/drawbridge:/data/drawbridge
      - ./data/cln-mainnet:/data/lightning:ro
      - tor-hostname:/data/tor:ro
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.get('http://127.0.0.1:4222/api/v1/ready',res=>{let body='';res.on('data',chunk=>body+=chunk);res.on('end',()=>process.exit(res.statusCode===200&&(body.trim()==='true'||body.includes('\"ready\":true'))?0:1));});req.on('error',()=>process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 25s
    depends_on:
      gatekeeper:
        condition: service_healthy
      redis:
        condition: service_healthy

  drawbridge-client:
    build:
      context: .
      dockerfile: Dockerfile.gatekeeper-client
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        VITE_SERVER_PORT: ${ARCHON_DRAWBRIDGE_PORT:-4222}
    image: ghcr.io/archetech/drawbridge-client
    environment:
      - VITE_PORT=4223
    user: "${ARCHON_UID}:${ARCHON_GID}"
    ports:
      - "${ARCHON_DRAWBRIDGE_CLIENT_PORT:-4223}:4223"
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.get('http://127.0.0.1:4223/',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      drawbridge:
        condition: service_healthy

  tor:
    image: goldy/tor-hidden-service:latest
    ports:
      - "${ARCHON_TOR_SOCKS_PORT:-9050}:9050"
    environment:
      DRAWBRIDGE_TOR_SERVICE_HOSTS: '4222:drawbridge:4222'
      DRAWBRIDGE_TOR_SERVICE_VERSION: '3'
      TOR_SOCKS_PORT: '0.0.0.0:9050'
    volumes:
      - ./data/tor-drawbridge:/var/lib/tor/hidden_service
      - tor-hostname:/tor-hostname
    entrypoint:
      - /bin/sh
      - -c
      - |
        pyentrypoint tor &
        while [ ! -f /var/lib/tor/hidden_service/drawbridge/hostname ]; do sleep 1; done
        cp /var/lib/tor/hidden_service/drawbridge/hostname /tor-hostname/hostname
        chmod 644 /tor-hostname/hostname
        echo '[tor] Published onion hostname'
        wait
    depends_on:
      drawbridge:
        condition: service_healthy

volumes:
  tor-hostname:
