services:
  wallet:
    build:
      context: .
      dockerfile: Dockerfile.wallet
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: ghcr.io/archetech/wallet
    environment:
      - ARCHON_WALLET_PORT=4240
      - ARCHON_WALLET_METRICS_PORT=4241
      - ARCHON_WALLET_NETWORK=${ARCHON_WALLET_NETWORK:-signet}
      - ARCHON_WALLET_BTC_HOST=${ARCHON_WALLET_BTC_HOST:-btc-signet-node}
      - ARCHON_WALLET_BTC_PORT=${ARCHON_WALLET_BTC_PORT:-38332}
      - ARCHON_WALLET_BTC_USER=${ARCHON_WALLET_BTC_USER:-${ARCHON_SIGNET_USER}}
      - ARCHON_WALLET_BTC_PASS=${ARCHON_WALLET_BTC_PASS:-${ARCHON_SIGNET_PASS}}
      - ARCHON_NODE_ID=${ARCHON_NODE_ID}
      - ARCHON_KEYMASTER_URL=http://keymaster:4226
      - ARCHON_ADMIN_API_KEY=${ARCHON_ADMIN_API_KEY}
    user: "${ARCHON_UID}:${ARCHON_GID}"
    ports:
      - "127.0.0.1:4240:4240"
      - "127.0.0.1:4241:4241"
    depends_on:
      keymaster:
        condition: service_started
